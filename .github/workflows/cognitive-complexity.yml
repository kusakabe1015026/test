name: Cognitive Complexity

on:
  pull_request:
  workflow_dispatch:

jobs:
  changed-functions:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug SHA
        run: |
          echo "BASE=${{ github.event.pull_request.base.sha }}"
          echo "HEAD=${{ github.sha }}"

      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang python3-clang

      - name: Get changed functions
        run: |
          python3 tools/get_changed_functions.py \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.sha }}" \
            > changed_functions.json

          echo "===== changed_functions.json ====="
          ls -l changed_functions.json
          wc -c changed_functions.json
          cat changed_functions.json
          echo "=================================="

      - name: Comment PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "===== Before comment_pr.py ====="
          pwd
          ls -la
          ls -l changed_functions.json
          wc -c changed_functions.json
          cat changed_functions.json
          echo "================================"

          python3 tools/comment_pr.py changed_functions.json

